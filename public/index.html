<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Training Compliance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#0a0f1e;--s1:#111827;--s2:#1a2235;--s3:#1e2d44;--bd:#1f3050;
  --ac:#00d4ff;--pu:#7c3aed;--gn:#10b981;--wn:#f59e0b;--rd:#ef4444;
  --t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:-1;
  background:radial-gradient(ellipse 80% 50% at 10% 20%,rgba(0,212,255,.05) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 90% 80%,rgba(124,58,237,.07) 0%,transparent 60%);}
/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:56px;
  background:rgba(17,24,39,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tbr{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.badge{font-size:.64rem;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;border:1px solid;font-weight:500;}
.bac{border-color:var(--ac);color:var(--ac);background:rgba(0,212,255,.08);}
.brd{border-color:var(--rd);color:var(--rd);background:rgba(239,68,68,.08);}
.upill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:30px;background:var(--s2);border:1px solid var(--bd);font-size:.76rem;}
.av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--pu));display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;}
/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh;}
.wrap{display:flex;flex:1;}
.sidebar{width:210px;min-height:calc(100vh - 56px);background:var(--s1);border-right:1px solid var(--bd);
  padding:14px 0;display:flex;flex-direction:column;gap:1px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.nsec{padding:0 12px 4px;font-size:.61rem;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-top:8px;}
.ni{display:flex;align-items:center;gap:7px;padding:7px 14px;cursor:pointer;color:var(--t2);font-size:.8rem;
  font-weight:500;transition:all .15s;border-left:3px solid transparent;}
.ni:hover{color:var(--t1);background:var(--s2);}
.ni.active{color:var(--ac);background:rgba(0,212,255,.05);border-left-color:var(--ac);}
.content{flex:1;padding:22px;overflow-y:auto;}
.page{display:none;}.page.active{display:block;}
/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px;margin-bottom:18px;}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:15px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.ac::before{background:linear-gradient(90deg,var(--ac),transparent);}
.sc.gn::before{background:linear-gradient(90deg,var(--gn),transparent);}
.sc.wn::before{background:linear-gradient(90deg,var(--wn),transparent);}
.sc.rd::before{background:linear-gradient(90deg,var(--rd),transparent);}
.sc.pu::before{background:linear-gradient(90deg,var(--pu),transparent);}
.slbl{font-size:.64rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:5px;}
.sval{font-size:1.65rem;font-weight:700;font-family:'JetBrains Mono',monospace;}
/* ── DAILY BANNER ── */
.dbanner{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:14px 18px;margin-bottom:16px;}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-top:9px;}
.dcard{border-radius:8px;padding:11px 12px;text-align:center;border:1px solid;}
.dcard .dl{font-size:.62rem;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:3px;}
.dcard .dv{font-size:1.3rem;font-weight:700;font-family:'JetBrains Mono',monospace;}
.dcard .ds{font-size:.7rem;margin-top:1px;}
.db{border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.06);}.db .dv{color:var(--ac);}
.dg{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.06);}.dg .dv{color:var(--gn);}
.dp{border-color:rgba(124,58,237,.3);background:rgba(124,58,237,.06);}.dp .dv{color:#a78bfa;}
.dt{border-color:rgba(20,184,166,.3);background:rgba(20,184,166,.06);}.dt .dv{color:#2dd4bf;}
/* ── TABLE ── */
.tw{background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.th{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--bd);}
.tt{font-weight:600;font-size:.88rem;}
table{width:100%;border-collapse:collapse;font-size:.76rem;}
thead th{padding:8px 11px;text-align:left;color:var(--t3);font-weight:600;font-size:.63rem;
  text-transform:uppercase;letter-spacing:.07em;background:var(--s2);border-bottom:1px solid var(--bd);white-space:nowrap;}
tbody tr{border-bottom:1px solid rgba(31,48,80,.45);transition:background .12s;}
tbody tr:hover{background:var(--s2);}
tbody td{padding:8px 11px;vertical-align:middle;}
.tid{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--ac);font-weight:500;}
/* ── COMPLIANCE BAR ── */
.cbar{display:flex;align-items:center;gap:5px;}
.btrk{flex:1;height:5px;background:var(--s3);border-radius:3px;min-width:45px;}
.bfil{height:100%;border-radius:3px;transition:width .5s;}
.pct{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;white-space:nowrap;}
.rp{font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
.rph{background:rgba(239,68,68,.15);color:var(--rd);border:1px solid rgba(239,68,68,.3);}
.rpm{background:rgba(245,158,11,.15);color:var(--wn);border:1px solid rgba(245,158,11,.3);}
.rpl{background:rgba(16,185,129,.15);color:var(--gn);border:1px solid rgba(16,185,129,.3);}
/* ── CHIPS ── */
.chip{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.62rem;font-weight:600;}
.chac{background:rgba(0,212,255,.1);color:var(--ac);}
.chpu{background:rgba(124,58,237,.1);color:#a78bfa;}
.chgn{background:rgba(16,185,129,.1);color:var(--gn);}
.chrd{background:rgba(239,68,68,.1);color:var(--rd);}
.chwn{background:rgba(245,158,11,.1);color:var(--wn);}
.chgr{background:rgba(100,116,139,.1);color:var(--t3);}
/* ── STEP ROWS (detail view) ── */
.phase-block{margin-bottom:16px;}
.phase-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd);}
.phase-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);}
.phase-badge{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:4px;}
.ph-pre {background:rgba(124,58,237,.15);color:#a78bfa;}
.ph-dur {background:rgba(245,158,11,.15); color:var(--wn);}
.ph-post{background:rgba(16,185,129,.15); color:var(--gn);}
.step-row{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:8px;
  border:1px solid var(--bd);margin-bottom:5px;background:var(--s2);}
.step-row.pass{border-color:var(--gn);background:rgba(16,185,129,.05);}
.step-row.fail{border-color:var(--rd);background:rgba(239,68,68,.04);}
.step-row.skip{opacity:.55;}
.step-icon{font-size:.95rem;flex-shrink:0;margin-top:1px;width:18px;text-align:center;}
.step-body{flex:1;min-width:0;}
.step-title{font-size:.79rem;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.step-code{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--t3);}
.step-meta{font-size:.64rem;color:var(--t3);margin-top:1px;}
.step-msg{font-size:.7rem;margin-top:4px;padding:3px 8px;border-radius:4px;display:inline-block;line-height:1.4;}
.msg-ok  {background:rgba(16,185,129,.1);color:var(--gn);}
.msg-fail{background:rgba(239,68,68,.1); color:var(--rd);}
.msg-skip{background:rgba(100,116,139,.1);color:var(--t3);}
/* ── DATA SECTION (detail tabs) ── */
.data-section{margin-bottom:18px;}
.ds-hdr{font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;}
.ds-ep{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--ac);font-weight:400;}
.ds-count{font-size:.6rem;padding:1px 6px;border-radius:4px;}
.cnt-ok{background:rgba(16,185,129,.1);color:var(--gn);}
.cnt-no{background:rgba(239,68,68,.1);color:var(--rd);}
.dgrid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px;margin-bottom:8px;}
.di{background:var(--s3);border-radius:6px;padding:7px 9px;}
.dikey{font-size:.6rem;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.dival{font-size:.75rem;color:var(--t1);margin-top:2px;word-break:break-word;}
.empty-row{font-size:.75rem;color:var(--rd);padding:8px 2px;}
/* template check row */
.tpl-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tpl-chip{font-size:.68rem;padding:2px 8px;border-radius:4px;font-weight:600;border:1px solid;}
.tpl-ok{background:rgba(16,185,129,.1);color:var(--gn);border-color:rgba(16,185,129,.3);}
.tpl-no{background:rgba(239,68,68,.1); color:var(--rd);border-color:rgba(239,68,68,.3);}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:none;
  cursor:pointer;font-family:'Sora',sans-serif;font-size:.76rem;font-weight:600;transition:all .15s;}
.btp{background:var(--ac);color:#000;}.btp:hover{background:#00b8d9;}
.bts{background:var(--s2);color:var(--t1);border:1px solid var(--bd);}.bts:hover{background:var(--s3);}
.btd{background:rgba(239,68,68,.15);color:var(--rd);border:1px solid rgba(239,68,68,.3);}
.btg{background:var(--gn);color:#000;}.btg:hover{background:#0d9e6e;}
.sm{padding:3px 8px;font-size:.7rem;}
.ic{width:27px;height:27px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:5px;}
/* ── MODAL ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);
  z-index:200;align-items:center;justify-content:center;padding:14px;}
.mo.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:13px;width:100%;max-width:920px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;}
.mhd{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bd);}
.mtl{font-weight:700;font-size:.95rem;}
.mbd{padding:18px;overflow-y:auto;flex:1;}
.mft{padding:12px 18px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:7px;}
/* ── FORM ── */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
label{font-size:.7rem;color:var(--t2);font-weight:600;}
input,select,textarea{background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--t1);
  padding:7px 10px;font-family:'Sora',sans-serif;font-size:.79rem;transition:border-color .15s;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac);}
select option{background:var(--s2);}
textarea{resize:vertical;min-height:60px;}
/* ── FILTERS ── */
.filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.sb{position:relative;flex:1;min-width:150px;}
.sb input{padding-left:28px;}
.sic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.8rem;}
/* ── TABS ── */
.tabbar{display:flex;gap:3px;margin-bottom:14px;background:var(--s2);border-radius:8px;padding:3px;}
.tab{padding:6px 13px;border-radius:6px;cursor:pointer;font-size:.76rem;font-weight:600;color:var(--t3);transition:all .15s;}
.tab.active{background:var(--s3);color:var(--t1);}
/* ── LOADER / TOAST ── */
.ld{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,212,255,.2);
  border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.lov{position:fixed;inset:0;background:rgba(10,15,30,.87);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:11px;}
.lt{color:var(--ac);font-size:.83rem;font-weight:500;}
#toast{position:fixed;bottom:18px;right:18px;z-index:500;display:flex;flex-direction:column;gap:5px;}
.ti{padding:9px 13px;border-radius:8px;font-size:.76rem;font-weight:500;animation:sli .3s ease;max-width:290px;}
.tis{background:#0f2e22;border:1px solid var(--gn);color:var(--gn);}
.tie{background:#2e0f0f;border:1px solid var(--rd);color:var(--rd);}
.tii{background:#0f1f2e;border:1px solid var(--ac);color:var(--ac);}
@keyframes sli{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
/* ── MISC ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.stl{font-size:1.05rem;font-weight:700;letter-spacing:-.01em;}
.sub{font-size:.75rem;color:var(--t3);margin-top:1px;}
.alert{padding:9px 13px;border-radius:8px;font-size:.77rem;margin-bottom:13px;display:flex;gap:7px;align-items:flex-start;}
.alc{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);}
.empty{text-align:center;padding:36px 20px;color:var(--t3);font-size:.8rem;}
/* ── LOGIN ── */
.lp{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
.lcard{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:34px;width:100%;max-width:370px;}
.llogo{text-align:center;margin-bottom:22px;}
.llogo h1{font-size:1.2rem;font-weight:700;}
.llogo p{color:var(--t3);font-size:.78rem;margin-top:3px;}
.lform{display:flex;flex-direction:column;gap:10px;}
#lpEdit{display:none;align-items:center;gap:5px;margin-top:6px;}
#lpEdit.show{display:flex;}
@media(max-width:768px){.sidebar{display:none;}.content{padding:12px;}.fgrid{grid-template-columns:1fr;}}
</style>
</head>
<body>
